<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PlatypusTools</title>
  <style>
    body { font-family: system-ui, sans-serif; width: 300px; padding: 8px; background: #1e1e1e; color: #eee; }
    label { display: block; margin-top: 8px; font-size: 12px; color: #aaa; }
    input { width: 100%; padding: 4px; background: #252525; color: #fff; border: 1px solid #444; }
    button { margin-top: 12px; padding: 6px 10px; background: #4caf50; color: #fff; border: 0; cursor: pointer; }
    .row { display: flex; gap: 6px; }
    .row button { flex: 1; }
    #status { margin-top: 8px; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <h3>PlatypusTools</h3>
  <label>Base URL</label>
  <input id="url" placeholder="https://localhost:47392" />
  <label>API Token</label>
  <input id="token" type="password" />
  <div class="row">
    <button id="save">Save</button>
    <button id="ping">Ping</button>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
