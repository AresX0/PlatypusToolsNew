name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: dotnet restore PlatypusTools.sln

      - name: Build (Release)
        run: dotnet build PlatypusTools.UI/PlatypusTools.UI.csproj -c Release --no-restore

      - name: Test (Core.Tests)
        run: dotnet test PlatypusTools.Core.Tests/PlatypusTools.Core.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"
        continue-on-error: true
